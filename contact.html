<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | AutomatePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="https://automation.techgrid-systems.org.uk/" class="text-2xl font-extrabold text-indigo-700 tracking-tight">AutomatePro</a>
            <div class="space-x-8 font-medium">
                <a href="https://automation.techgrid-systems.org.uk/" class="text-slate-600 hover:text-indigo-600">Home</a>
                <a href="about" class="text-slate-600 hover:text-indigo-600">About</a>
                <a href="services" class="text-slate-600 hover:text-indigo-600">Services</a>
                <a href="portfolio" class="text-indigo-600">Portfolio</a>
                <a href="contact" class="bg-slate-900 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700 transition">Contact</a>
            </div>
        </div>
    </nav>
    <main class="max-w-xl mx-auto px-6 py-20">
        <h1 class="text-4xl font-extrabold mb-8">Let's Automate Your Workflow</h1>
        <form id="contactForm" class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                <input type="text" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                <input type="email" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Project Brief</label>
                <textarea class="w-full p-3 border border-slate-300 rounded-lg h-32 focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition" required></textarea>
            </div>
            <button type="submit" class="w-full bg-indigo-700 text-white p-4 rounded-xl font-bold hover:bg-indigo-800 transition shadow-lg">Submit Request</button>
        </form>
    </main>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you! Our engineering team will reach out to you within 24 hours.');
            e.target.reset();
        });
    </script>
</body>
</html>
